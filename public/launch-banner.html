<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The YSM Brand — Launch Banner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1008;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
    }

    /* ── Banner canvas: 1200 × 630 (standard OG/social card) ── */
    .banner {
      width: 1200px;
      height: 630px;
      background: #0A0806;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Subtle radial glow behind logo */
    .banner::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(200,90,42,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Decorative corner lines */
    .corner {
      position: absolute;
      width: 48px;
      height: 48px;
      border-color: rgba(200,90,42,0.35);
      border-style: solid;
    }
    .corner-tl { top: 28px; left: 28px; border-width: 1px 0 0 1px; }
    .corner-tr { top: 28px; right: 28px; border-width: 1px 1px 0 0; }
    .corner-bl { bottom: 28px; left: 28px; border-width: 0 0 1px 1px; }
    .corner-br { bottom: 28px; right: 28px; border-width: 0 1px 1px 0; }

    /* Horizontal rule accents */
    .rule-left, .rule-right {
      position: absolute;
      top: 50%;
      width: 180px;
      height: 1px;
      background: linear-gradient(to var(--dir), rgba(200,90,42,0.5), transparent);
    }
    .rule-left  { left: 50px;  --dir: right; }
    .rule-right { right: 50px; --dir: left; }

    /* ── Main content ── */
    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      z-index: 1;
    }

    .eyebrow {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #C85A2A;
      margin-bottom: 28px;
    }

    .logo-wrap {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      overflow: hidden;
      border: 1.5px solid rgba(200,90,42,0.3);
      box-shadow: 0 0 48px rgba(200,90,42,0.18);
      margin-bottom: 32px;
      flex-shrink: 0;
    }
    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 52px;
      font-weight: 700;
      color: #F5E6D3;
      letter-spacing: 0.04em;
      text-align: center;
      line-height: 1;
      margin-bottom: 18px;
    }

    .tagline {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #9A8B7A;
      margin-bottom: 32px;
    }

    .divider {
      width: 48px;
      height: 1px;
      background: rgba(200,90,42,0.5);
      margin-bottom: 24px;
    }

    .domain {
      font-family: 'Inter', sans-serif;
      font-size: 22px;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: #E8D5C4;
    }

    .domain span {
      color: #C85A2A;
    }

    .launch-badge {
      margin-top: 28px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(200,90,42,0.12);
      border: 1px solid rgba(200,90,42,0.3);
      border-radius: 999px;
      padding: 8px 20px;
    }
    .launch-badge .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #C85A2A;
      animation: pulse 2s ease-in-out infinite;
    }
    .launch-badge span {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #C85A2A;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.85); }
    }

    /* Lusaka tag bottom-right */
    .location {
      position: absolute;
      bottom: 32px;
      right: 40px;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(154,139,122,0.6);
    }

    /* ── Print / export hint ── */
    .hint {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: #9A8B7A;
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      padding: 8px 20px;
      border-radius: 999px;
      letter-spacing: 0.05em;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="banner">
    <!-- Corner accents -->
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <!-- Side rules -->
    <div class="rule-left"></div>
    <div class="rule-right"></div>

    <!-- Main content -->
    <div class="content">
      <p class="eyebrow">Lusaka Wellness House</p>

      <div class="logo-wrap">
        <img src="/ysm-brand-logo.jpg" alt="The YSM Brand" />
      </div>

      <h1 class="brand-name">The YSM Brand</h1>
      <p class="tagline">Culinary · Brunch · Fitness</p>

      <div class="divider"></div>

      <p class="domain"><span>www.</span>theysmbrand<span>.com</span></p>

      <div class="launch-badge">
        <div class="dot"></div>
        <span>Launching June 4, 2026</span>
      </div>
    </div>

    <!-- Location watermark -->
    <p class="location">Lusaka, Zambia</p>
  </div>

  <p class="hint">Screenshot at 1200 × 630 px · Use browser zoom 100%</p>

</body>
</html>
